
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-primary bg-primary">
    <div class="container-fluid">
        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i class="bx bx-menu fs-3"></i>
        </button>
        <span class="navbar-brand text-white">Transactions</span>
        <i class="bx bx-user-circle text-white fs-3"></i>
    </div>
</nav>


<ul class="nav nav-pills nav-fill bg-white shadow-sm">
    <li class="nav-item">
        <a class="nav-link" href="#">Buy</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="#">Sell</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="#">History</a>
    </li>
</ul>


<div class="container mt-3">
    <h5 class="mb-3">Sell Items</h5>
    <form>
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Customer Name">
        </div>
        <div class="mb-3">
            <input type="tel" class="form-control" placeholder="Phone Number">
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Address">
        </div>
        <hr>

        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Product Name">
        </div>
       
        
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Price">
        </div>
        <div class="mb-3">
            <input type="number" class="form-control" placeholder="No. of Items">
        </div>
        <div class="mb-3">
            <input type="date" class="form-control" placeholder="Expiry Date">
        </div>

        <div class="text-center">
            <button type="button" class="btn btn-outline-primary">
                <i class="bx bx-plus"></i> Add Product
            </button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
