<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to TopStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }
        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: url('https://www.transparenttextures.com/patterns/cubes.png'), #008060; 
            background-size: cover;
        }
        .logo-box {
            font-size: 60px;
            background: white;
            color: #008060;
            border-radius: 12px;
            padding: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .welcome-text {
            font-size: 24px;
            font-weight: bold;
        }
        .app-name {
            font-size: 28px;
            font-weight: bold;
        }
        .get-started-btn {
            background: white;
            color: #008060;
            padding: 10px 25px;
            font-size: 18px;
            border-radius: 8px;
            margin-top: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .get-started-btn:hover {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="welcome-screen">
    <div class="logo-box">
        <i class="bx bx-package"></i> <!-- Box Icon -->
    </div>
    <div class="welcome-text">Welcome to</div>
    <div class="app-name">TopStock</div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
