<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Scanner Section -->
<div class="container mt-3">
    <div class="position-relative bg-secondary rounded p-5 text-center text-white">
        <i class="bx bx-barcode display-1"></i>
        <button class="btn btn-light position-absolute top-0 end-0 m-2" disabled>FLASH</button>
    </div>
</div>

<!-- Product List -->
<div class="container mt-3">
    <div class="card p-3">
        
        <!-- Product 1: CocaCola -->
        <div class="d-flex align-items-center border-bottom py-2">
            
            <div class="flex-grow-1">
                <div class="fw-bold">CocaCola</div>
                <small class="text-muted">54491472</small>
                <div class="text-secondary">$0.00</div>
            </div>
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-secondary">-</button>
                <span class="mx-2">1</span>
                <button class="btn btn-sm btn-outline-secondary">+</button>
            </div>
        </div>

        <!-- Product 2: Nesquik -->
        <div class="d-flex align-items-center border-bottom py-2">
           
            <div class="flex-grow-1">
                <div class="fw-bold">Nesquik</div>
                <small class="text-muted">2637446426368</small>
                <div class="text-secondary">$9.00 · Cereals · Bag</div>
            </div>
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-secondary">-</button>
                <span class="mx-2">9</span>
                <button class="btn btn-sm btn-outline-secondary">+</button>
            </div>
        </div>

        <!-- Product 3: KitKat -->
        <div class="d-flex align-items-center py-2">
            
            <div class="flex-grow-1">
                <div class="fw-bold">KitKat</div>
                <small class="text-muted">2645780642146</small>
                <div class="text-secondary">$2.00 · Bars · Wrap</div>
            </div>
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-secondary">-</button>
                <span class="mx-2">14</span>
                <button class="btn btn-sm btn-outline-secondary">+</button>
            </div>
        </div>
    </div>

   
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
